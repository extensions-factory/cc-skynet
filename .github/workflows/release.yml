name: Auto Release

on:
  push:
    branches: [main]
    paths: ['.claude-plugin/marketplace.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Read version from marketplace.json
        id: version
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/marketplace.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check
        run: |
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} does not exist — will create release."
          fi

      - name: Extract changelog for this version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          WIKI_CHANGELOG="wiki/CHANGELOG.md"
          if [ ! -f "$WIKI_CHANGELOG" ]; then
            echo "::warning::wiki/CHANGELOG.md not found — using fallback message"
            BODY="Release v${VERSION}"
          else
            # Extract the section for this version from wiki/CHANGELOG.md
            # Matches from "## [X.Y.Z]" until the next "## [" or end of file
            BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" "$WIKI_CHANGELOG" | sed '$d')
            if [ -z "$BODY" ]; then
              BODY="Release v${VERSION} — see [wiki](../../wiki/CHANGELOG) for details."
            fi
          fi
          # Use heredoc delimiter for multiline output
          {
            echo "body<<GHEOF"
            echo "$BODY"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --target main
          echo "Created release v${{ steps.version.outputs.version }}"
